name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            goos: darwin
            goarch: arm64
            asset_name: mcp-memory-libravdb-darwin-arm64
          - runner: macos-13
            goos: darwin
            goarch: amd64
            asset_name: mcp-memory-libravdb-darwin-amd64
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            asset_name: mcp-memory-libravdb-linux-amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            asset_name: mcp-memory-libravdb-linux-arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }

      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/nanite
          path: nanite

      - uses: actions/checkout@v4
        with:
          repository: zephyr-systems/libravdb-contracts
          path: libravdb-contracts

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        working-directory: mcp-libravdb-server
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF_NAME#v}
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "dist/${{ matrix.asset_name }}" ./cmd/mcp-memory-libravdb

      - name: Checksum
        working-directory: mcp-libravdb-server/dist
        run: shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            mcp-libravdb-server/dist/${{ matrix.asset_name }}
            mcp-libravdb-server/dist/${{ matrix.asset_name }}.sha256

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  homebrew:
    name: publish-homebrew
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }

      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }

      - name: Generate formula
        working-directory: mcp-libravdb-server
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          DARWIN_ARM_SHA=$(shasum -a 256 ../dist/mcp-memory-libravdb-darwin-arm64 | awk '{print $1}')
          DARWIN_AMD_SHA=$(shasum -a 256 ../dist/mcp-memory-libravdb-darwin-amd64 | awk '{print $1}')
          LINUX_AMD_SHA=$(shasum -a 256 ../dist/mcp-memory-libravdb-linux-amd64 | awk '{print $1}')
          LINUX_ARM_SHA=$(shasum -a 256 ../dist/mcp-memory-libravdb-linux-arm64 | awk '{print $1}')

          cat > ../dist/mcp-memory-libravdb.rb <<RUBY
      class McpMemoryLibravdb < Formula
        desc "MCP server for the libravdbd cognitive memory kernel"
        homepage "https://github.com/xDarkicex/mcp-libravdb-server"
        version "${VERSION}"

        on_macos do
          if Hardware::CPU.arm?
            url "https://github.com/xDarkicex/mcp-libravdb-server/releases/download/v${VERSION}/mcp-memory-libravdb-darwin-arm64"
            sha256 "${DARWIN_ARM_SHA}"
          else
            url "https://github.com/xDarkicex/mcp-libravdb-server/releases/download/v${VERSION}/mcp-memory-libravdb-darwin-amd64"
            sha256 "${DARWIN_AMD_SHA}"
          end
        end

        on_linux do
          if Hardware::CPU.arm?
            url "https://github.com/xDarkicex/mcp-libravdb-server/releases/download/v${VERSION}/mcp-memory-libravdb-linux-arm64"
            sha256 "${LINUX_ARM_SHA}"
          else
            url "https://github.com/xDarkicex/mcp-libravdb-server/releases/download/v${VERSION}/mcp-memory-libravdb-linux-amd64"
            sha256 "${LINUX_AMD_SHA}"
          end
        end

        def install
          bin.install Dir["*"].first => "mcp-memory-libravdb"
        end

        test do
          system "#{bin}/mcp-memory-libravdb", "--version"
        end
      end
      RUBY

      - uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: dist/mcp-memory-libravdb.rb

      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/homebrew-mcp-libravdb
          token: ${{ secrets.SIDECAR_REPO_TOKEN }}
          path: tap

      - name: Update tap
        run: |
          mkdir -p tap/Formula
          cp dist/mcp-memory-libravdb.rb tap/Formula/mcp-memory-libravdb.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mcp-memory-libravdb.rb
          git commit -m "mcp-memory-libravdb ${GITHUB_REF_NAME#v}" || exit 0
          git push
