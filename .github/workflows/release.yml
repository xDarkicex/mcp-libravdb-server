name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.asset_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset_name: mcp-memory-libravdb-darwin-arm64
          - goos: darwin
            goarch: amd64
            asset_name: mcp-memory-libravdb-darwin-amd64
          - goos: linux
            goarch: amd64
            asset_name: mcp-memory-libravdb-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: mcp-memory-libravdb-linux-arm64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }

      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/nanite
          path: nanite

      - uses: actions/checkout@v4
        with:
          repository: zephyr-systems/libravdb-contracts
          path: libravdb-contracts

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        working-directory: mcp-libravdb-server
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          VERSION=${GITHUB_REF_NAME#v}
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "dist/${{ matrix.asset_name }}" ./cmd/mcp-memory-libravdb

      - name: Checksum
        working-directory: mcp-libravdb-server/dist
        run: shasum -a 256 "${{ matrix.asset_name }}" > "${{ matrix.asset_name }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            mcp-libravdb-server/dist/${{ matrix.asset_name }}
            mcp-libravdb-server/dist/${{ matrix.asset_name }}.sha256

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  homebrew:
    name: publish-homebrew
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }

      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true }

      - name: Generate formula
        run: |
          chmod +x mcp-libravdb-server/packaging/homebrew/generate-formula.sh
          mcp-libravdb-server/packaging/homebrew/generate-formula.sh "${GITHUB_REF_NAME#v}" dist dist/mcp-memory-libravdb.rb

      - uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: dist/mcp-memory-libravdb.rb

      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/homebrew-mcp-libravdb
          token: ${{ secrets.GITHUB_TOKEN }}
          path: tap

      - name: Update tap
        run: |
          mkdir -p tap/Formula
          cp dist/mcp-memory-libravdb.rb tap/Formula/mcp-memory-libravdb.rb
          cd tap
          git remote set-url origin "https://x-access-token:${{ secrets.SIDECAR_REPO_TOKEN }}@github.com/xDarkicex/homebrew-mcp-libravdb.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/mcp-memory-libravdb.rb
          git commit -m "mcp-memory-libravdb ${GITHUB_REF_NAME#v}" || exit 0
          git push

  deb:
    name: build-deb-${{ matrix.arch }}
    runs-on: ubuntu-24.04
    needs: build
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: mcp-memory-libravdb-linux-amd64
          - arch: arm64
            artifact: mcp-memory-libravdb-linux-arm64
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }

      - uses: actions/download-artifact@v4
        with: { name: "${{ matrix.artifact }}", path: dist }

      - name: Build .deb
        run: |
          chmod +x mcp-libravdb-server/packaging/linux/build-deb.sh
          mcp-libravdb-server/packaging/linux/build-deb.sh "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}" "dist/${{ matrix.artifact }}" dist

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.deb.sha256

  apt:
    name: publish-apt
    runs-on: ubuntu-24.04
    needs: deb
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: "deb-*", path: dist/debs, merge-multiple: true }

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Get GPG key ID
        id: gpg
        run: |
          KEY_ID=$(gpg --list-keys --with-colons 2>/dev/null | grep '^pub' | head -1 | cut -d: -f5)
          echo "key_id=${KEY_ID}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/apt-mcp-libravdb
          token: ${{ secrets.GITHUB_TOKEN }}
          path: apt-repo

      - name: Export GPG public key
        working-directory: apt-repo
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.SIDECAR_REPO_TOKEN }}@github.com/xDarkicex/apt-mcp-libravdb.git"
          gpg --armor --export "${{ steps.gpg.outputs.key_id }}" > gpg.key
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gpg.key
          git commit -m "Update GPG public key" || exit 0
          git push origin main

      - name: Update apt repository
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          POOL="apt-repo/pool/main/m/mcp-memory-libravdb"
          mkdir -p "${POOL}"

          # Copy .debs to pool
          for deb in dist/debs/*.deb; do
            cp "$deb" "${POOL}/"
          done

          cd apt-repo
          git remote set-url origin "https://x-access-token:${{ secrets.SIDECAR_REPO_TOKEN }}@github.com/xDarkicex/apt-mcp-libravdb.git"

          # Remove old versions of this package
          rm -f pool/main/m/mcp-memory-libravdb/mcp-memory-libravdb_*_amd64.deb
          rm -f pool/main/m/mcp-memory-libravdb/mcp-memory-libravdb_*_arm64.deb
          cp ../dist/debs/*.deb "${POOL}/"

          # Generate Packages files
          for arch in amd64 arm64; do
            DEBS=$(find pool -name "*_${arch}.deb" -type f)
            if [ -n "$DEBS" ]; then
              mkdir -p "dists/stable/main/binary-${arch}"
              dpkg-scanpackages --multiversion pool > "dists/stable/main/binary-${arch}/Packages" 2>/dev/null
              gzip -kf "dists/stable/main/binary-${arch}/Packages"
            fi
          done

          # Generate Release file
          printf 'Origin: xDarkicex\nLabel: mcp-memory-libravdb\nSuite: stable\nCodename: stable\nDate: %s\nArchitectures: amd64 arm64\nComponents: main\nDescription: MCP server for the libravdbd cognitive memory kernel\n' "$(date -Ru)" > "dists/stable/Release"

          # Sign Release
          gpg --default-key "${{ steps.gpg.outputs.key_id }}" \
              -abs --no-tty --clearsign \
              -o "dists/stable/InRelease" "dists/stable/Release"
          gpg --default-key "${{ steps.gpg.outputs.key_id }}" \
              -abs --no-tty \
              -o "dists/stable/Release.gpg" "dists/stable/Release"

          git add -A
          git diff --staged --quiet || git commit -m "Release mcp-memory-libravdb ${VERSION}"
          git pull --rebase
          git push
