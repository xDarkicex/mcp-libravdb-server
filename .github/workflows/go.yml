name: Go

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }
      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/nanite
          path: nanite
      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/libravdb-contracts
          path: libravdb-contracts
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - working-directory: mcp-libravdb-server
        run: echo "GOWORK=off" >> $GITHUB_ENV
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: mcp-libravdb-server

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }
      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/nanite
          path: nanite
      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/libravdb-contracts
          path: libravdb-contracts
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - working-directory: mcp-libravdb-server
        run: go test -race -coverprofile=coverage.out ./...
      - working-directory: mcp-libravdb-server
        run: go tool cover -func=coverage.out

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: mcp-libravdb-server }
      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/nanite
          path: nanite
      - uses: actions/checkout@v4
        with:
          repository: xDarkicex/libravdb-contracts
          path: libravdb-contracts
      - uses: actions/setup-go@v5
        with: { go-version: "1.25" }
      - working-directory: mcp-libravdb-server
        run: make build-linux
      - run: ./mcp-libravdb-server/bin/mcp-memory-libravdb-linux --version
